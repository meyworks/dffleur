<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact | DF FLEUR</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body class="noise"><header class="topbar"><nav class="nav container"><a class="brand" href="index.html"><img src="assets/logo.jpg" alt="DF FLEUR"><b>DF FLEUR</b></a><button class="menuBtn">Menu</button><div class="links"><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="news.html">News & Offers</a><a class="active" href="contact.html">Contact</a></div></nav></header><main><section class="page-head container"><div class="eyebrow">Find Us</div><h1 class="page-title">Contact Us</h1><p class="lead">We are happy to welcome you. Find our location, opening hours, and contact details below.</p></section><section class="container section" style="padding-top:10px"><div id="status" class="status"><div class="loader"></div>Loading contact details...</div><div id="contact" class="contact-wrap"></div></section></main><footer class="footer"><div class="container">© DF FLEUR Restaurant & Café</div></footer><script src="js/sheets.js"></script><script>
(async()=>{const holder=document.getElementById('contact'),st=document.getElementById('status');const c=(await loadSheet('Contact'))[0]||{};st.style.display='none';const mapQuery=encodeURIComponent(c.Address||'DF Fleur Cairo');holder.innerHTML=`<article class="card"><span class="tag">${c.Name||'DF FLEUR'}</span><div class="contact-line"><b>Phone</b><a class="btn" href="tel:${c.Phone||''}">${c.Phone||''}</a></div><div class="contact-line"><b>WhatsApp</b><a class="btn primary" href="https://wa.me/${c.WhatsApp||''}" target="_blank">Chat on WhatsApp</a></div><div class="contact-line"><b>Address</b>${c.Address||''}</div><div class="contact-line"><b>Opening Hours</b>${c.OpeningHours||''}</div><div class="actions" style="justify-content:flex-start;margin-top:20px">${c.FacebookUrl?`<a class="btn" href="${c.FacebookUrl}" target="_blank">Facebook</a>`:''}${c.InstagramUrl?`<a class="btn" href="${c.InstagramUrl}" target="_blank">Instagram</a>`:''}${c.MapUrl?`<a class="btn primary" href="${c.MapUrl}" target="_blank">Open Map</a>`:''}</div></article><article class="card"><iframe class="map-frame" loading="lazy" src="https://www.google.com/maps?q=${mapQuery}&output=embed"></iframe></article>`;})();
</script></body></html>
