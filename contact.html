<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | DF FLEUR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="contact">
  <header class="site-header" data-header>
    <a class="brand" href="index.html" aria-label="DF FLEUR home"><img src="assets/images/logo.jpg" alt="DF FLEUR logo"></a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle><span></span><span></span><span></span></button>
    <nav class="site-nav" id="site-nav" data-nav>
      <a href="index.html">Home</a>
      <a href="news.html">News & Offers</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-hero contact-hero">
      <p class="eyebrow">Visit DF FLEUR</p>
      <h1>Contact Us</h1>
      <p>Find our opening hours, address, phone number, WhatsApp, and social media links below.</p>
    </section>
    <section class="section contact-layout">
      <div class="contact-panel" data-contact-card></div>
      <form class="reservation-form" id="reservation-form">
        <p class="eyebrow">Reservation request</p>
        <label>Name <input name="name" autocomplete="name" required></label>
        <label>Phone <input name="phone" autocomplete="tel" required></label>
        <label>Date <input name="date" type="date" required></label>
        <label>Message <textarea name="message" rows="4"></textarea></label>
        <button class="button primary" type="submit">Send Request Via WhatsApp</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <img src="assets/images/logo.jpg" alt="DF FLEUR logo">
    <p>DF FLEUR Cafe & Restaurant</p>
  </footer>
  <script src="assets/js/app.js"></script>
  <script>
    function getDatabaseWhatsAppNumber() {
      const contactCard = document.querySelector('[data-contact-card]');
      if (!contactCard) return '';

      const whatsappLink = contactCard.querySelector(
        'a[href*="wa.me"], a[href*="api.whatsapp.com"], a[href*="whatsapp.com/send"]'
      );

      if (whatsappLink) {
        try {
          const url = new URL(whatsappLink.href, window.location.href);
          const queryNumber = url.searchParams.get('phone') || '';
          const pathNumber = url.pathname.replace(/\D/g, '');
          return (queryNumber || pathNumber).replace(/\D/g, '');
        } catch (error) {
          return whatsappLink.getAttribute('href').replace(/\D/g, '');
        }
      }

      // Fallback to a displayed WhatsApp number loaded into the contact card.
      const whatsappTextElement = Array.from(contactCard.querySelectorAll('*')).find(function (element) {
        return /whatsapp/i.test(element.textContent || '');
      });

      return whatsappTextElement
        ? (whatsappTextElement.textContent || '').replace(/\D/g, '')
        : '';
    }

    document.getElementById('reservation-form').addEventListener('submit', function (event) {
      event.preventDefault();

      const form = event.currentTarget;
      const whatsappNumber = getDatabaseWhatsAppNumber();

      if (!whatsappNumber) {
        alert('The WhatsApp number is still loading. Please wait a moment and try again.');
        return;
      }

      const name = form.elements.name.value.trim();
      const phone = form.elements.phone.value.trim();
      const date = form.elements.date.value;
      const message = form.elements.message.value.trim();

      const reservationMessage = [
        'Hello DF FLEUR, I would like to request a reservation.',
        '',
        'Name: ' + name,
        'Phone: ' + phone,
        'Date: ' + date,
        'Message: ' + (message || 'No additional message')
      ].join('\n');

      const whatsappUrl = 'https://wa.me/' + whatsappNumber + '?text=' + encodeURIComponent(reservationMessage);
      window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
