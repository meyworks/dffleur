<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Luxury Menu | DF FLEUR</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body class="noise"><header class="topbar"><nav class="nav container"><a class="brand" href="index.html"><img src="assets/logo.jpg" alt="DF FLEUR"><b>DF FLEUR</b></a><button class="menuBtn">Menu</button><div class="links"><a href="index.html">Home</a><a class="active" href="menu.html">Menu</a><a href="news.html">News & Offers</a><a href="contact.html">Contact</a></div></nav></header><main><section class="page-head container"><div class="eyebrow">Natural Flipping Menu</div><h1 class="page-title">Luxury Menu</h1><p class="lead">Connected to <b>MenuCategories</b> and <b>MenuItems</b> sheets. Use the arrows to flip between menu sections.</p></section><section class="container" style="padding-bottom:80px"><div id="status" class="status"><div class="loader"></div>Loading menu...</div><div class="book-stage"><div id="book" class="book"></div></div><div class="book-controls"><button class="btn" id="prev">← Previous</button><span id="pageNo" class="tag">1 / 1</span><button class="btn primary" id="next">Next →</button></div></section></main><footer class="footer"><div class="container">© DF FLEUR Restaurant & Café</div></footer><script src="js/sheets.js"></script><script>
let current=0,pages=[];function showPage(i){current=Math.max(0,Math.min(i,pages.length-1));pages.forEach((p,n)=>p.classList.toggle('hidden',n!==current));document.getElementById('pageNo').textContent=`${current+1} / ${pages.length||1}`;}
(async()=>{const st=document.getElementById('status'),book=document.getElementById('book');const cats=await loadSheet('MenuCategories');const items=activeRows(await loadSheet('MenuItems'));const categoryNames=(cats.map(c=>c.Categories||c.Category||c.Name).filter(Boolean));const used=[...new Set(items.map(i=>i.Category).filter(Boolean))];const all=[...new Set([...categoryNames,...used])];st.style.display='none';book.innerHTML=all.map(cat=>{const list=items.filter(i=>i.Category===cat);return `<section class="page hidden"><h2>${cat}</h2>${list.length?list.map(i=>`<div class="menu-row"><div><h4>${i.Name||''}</h4><p>${i.Description||''}</p></div><div class="price">${money(i.Price)||'Ask'}</div></div>`).join(''):'<p>No items in this category yet.</p>'}</section>`}).join('');pages=[...document.querySelectorAll('.page')];showPage(0);})();
document.getElementById('prev').onclick=()=>showPage(current-1);document.getElementById('next').onclick=()=>showPage(current+1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')showPage(current+1); if(e.key==='ArrowLeft')showPage(current-1);});
</script></body></html>
