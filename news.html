<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>News & Offers | DF FLEUR</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body class="noise"><header class="topbar"><nav class="nav container"><a class="brand" href="index.html"><img src="assets/logo.jpg" alt="DF FLEUR"><b>DF FLEUR</b></a><button class="menuBtn">Menu</button><div class="links"><a href="index.html">Home</a><a href="menu.html">Menu</a><a class="active" href="news.html">News & Offers</a><a href="contact.html">Contact</a></div></nav></header><main><section class="page-head container"><div class="eyebrow">Latest Updates</div><h1 class="page-title">News & Offers</h1><p class="lead">Connected to the <b>Offers</b> sheet: ID, Title, Description, Type, ImageUrl, StartDate, EndDate, Status.</p></section><section class="container section" style="padding-top:10px"><div id="status" class="status"><div class="loader"></div>Loading latest news and offers...</div><div id="news" class="news-list"></div></section></main><footer class="footer"><div class="container">© DF FLEUR Restaurant & Café</div></footer><script src="js/sheets.js"></script><script>
(async()=>{const box=document.getElementById('news'),st=document.getElementById('status');const rows=activeRows(await loadSheet('Offers'));st.style.display='none';box.innerHTML=rows.map(r=>`<article class="card"><span class="tag">${r.Type||'News'}</span>${r.ImageUrl?`<img class="news-img" src="${r.ImageUrl}" alt="${r.Title}" onerror="this.style.display='none'">`:''}<h3>${r.Title||''}</h3><p>${r.Description||''}</p>${r.StartDate?`<p><b>Date:</b> ${r.StartDate}</p>`:''}</article>`).join('')||'<p class="status">No active offers found.</p>';})();
</script></body></html>
